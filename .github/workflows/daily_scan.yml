# .github/workflows/daily_scan.yml — 아침 알림 전용
name: Daily Volatility Scan

on:
  schedule:
    - cron: "30 22 * * *"   # UTC 22:30 = 한국시간 아침 7:30
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests pandas mplfinance
      - name: Send morning list
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python volatility_agent.py scan
